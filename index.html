<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FitApp - Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#4facfe;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#3a8de0;
}

.link{
  margin-top:10px;
  display:block;
  color:#4facfe;
  cursor:pointer;
}
</style>

</head>
<body>

<div class="container">
  <h2>FitApp</h2>

  <input type="text" placeholder="Correo">
  <input type="password" placeholder="Contraseña">

  <button onclick="location.href='home.html'">
    Iniciar sesión
  </button>

  <span class="link" onclick="location.href='registro.html'">
    Crear cuenta
  </span>
</div>

</body>
</html>
