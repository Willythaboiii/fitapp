<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - FitApp</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#43e97b,#38f9d7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#43e97b;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#2ec766;
}

.link{
  margin-top:10px;
  display:block;
  color:#43e97b;
  cursor:pointer;
}
</style>

</head>
<body>

<div class="container">
  <h2>Registro</h2>

  <input type="text" placeholder="Nombre">
  <input type="email" placeholder="Correo">
  <input type="password" placeholder="Contraseña">
  <input type="password" placeholder="Confirmar contraseña">

  <button onclick="location.href='index.html'">
    Registrarse
  </button>

  <span class="link" onclick="location.href='index.html'">
    Volver al login
  </span>
</div>

</body>
</html>
